[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    integration: tests that hit the live Alpaca API (deselected by default)
    slow: tests that take longer than ~1s
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
